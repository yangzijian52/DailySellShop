# DailySellShop 收购物品配置
# 物品ID必须是标准的 Bukkit Material 名称 (全大写)
# 参考: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Material.html
# ==========================================
#        DailySellShop 完整配置文件 (Paper 26.2)
# /ds 使用本文件；/dss 购买商店使用 shopconfig.yml，但普通商品名称和基础价格来自本文件 items。
# 修改后执行 /ds reload 或 /dss reload，两条命令都会重载两份配置并刷新商品列表。
# 插件不会覆盖服务器中已经存在的配置；版本升级时需要自行同步新增节点和默认值。
#
# 编辑规则：
# 1. 文件编码必须保持 UTF-8；缩进只能使用空格，不能使用 Tab。
# 2. Material 键必须全大写；药水和附魔书扩展键不要改名，其真实材质由 material 字段决定。
# 3. 文本支持 & 颜色代码，例如 &a 绿色、&c 红色、&l 粗体。
# 4. 价格建议保留两位小数且不得为负数；修改原料价格时，应同步检查其合成品价格，避免套利。
# 5. 本文件的菜单槽位仅影响 Java 箱子 GUI；Floodgate 基岩版使用功能等价的表单。
# ==========================================

# 时区用于判断每日/每小时刷新时间。必须是有效 ZoneId，例如 Asia/Shanghai、UTC。
timezone: "Asia/Shanghai"

# ==========================================
#           刷新模式设置 (核心设置)
# ==========================================
# 模式选择:
#   DAILY  = 每日刷新 (北京时间 00:00)，限额为 100%
#   HOURLY = 每小时刷新 (北京时间整点)，限额为下方设定的倍率
# 其他值会按 DAILY 的限额逻辑处理；建议只使用以上两个大写值。
refresh-mode: "HOURLY"

# 随机抽取设置
random-rotation:
  # true：每轮从 items 随机抽取；false：始终显示 static-items 中的固定商品。
  enabled: true
  # 每轮抽取数量。若数量超过 items 总数会自动按实际总数处理；还会受 menu.sell-slots 数量限制。
  amount: 5

# 仅在 refresh-mode 为 HOURLY 时生效
hourly-settings:
  # HOURLY 模式的额度倍率：实际限额 = daily-limit x multiplier，并向下取整且最少为 1。
  # 例如 daily-limit=200、multiplier=0.5，则每小时可出售 100 个。
  multiplier: 0.5


# ==========================================
#               语言与消息
# ==========================================
# 所有文本支持 & 颜色代码。prefix 会拼接到出售成功/失败和权限提示之前。
# sold 支持：%amount%=出售数量、%item%=显示名、%money%=获得金额、%limit%=本轮剩余额度。
# deposit-failed 支持 %error%=经济插件返回的失败原因；失败时已移除的物品会恢复。
# config-reloaded 支持 %mode%=当前刷新模式。
messages:
  prefix: "&8[&a收购商&8] "
  # 商店标题 (对应不同模式)
  title-daily: "&0每日收购 (0点刷新)"
  title-hourly: "&0限时收购 (整点刷新)"

  sold: "&a成功出售 %amount% 个 %item%，获得 $%money%！(本轮剩余: %limit%)"
  deposit-failed: "&c经济入账失败，物品已退回：%error%"
  no-item: "&c你背包里没有足够的物品！"
  limit-reached: "&c该物品本轮出售额度已用完！"
  config-reloaded: "&a配置已重载，当前模式: %mode%"
  no-permission: "&c你没有权限使用这个按钮。"

# ==========================================
#               箱子菜单样式
# ==========================================
# size 会限制在 9-54，并自动向上修正为 9 的倍数。
# sell-slots 决定自动生成的收购按钮放在哪些格子里，槽位从 0 开始。
# 不要让 sell-slots 与 buttons 的 slot 重复；收购商品后绘制，会覆盖同槽位按钮。
# buttons 的节点 ID 可自定义；没有 commands 的按钮仅作为装饰，有 commands 的按钮才可点击。
# 通用按钮字段：
#   slot/index: 槽位（优先使用 slot）；material: Bukkit Material；amount: 图标数量 1-64；
#   name/lore: 显示文本；permission: 可选权限；glow/isEnchant: 是否发光；
#   hide-flags/hideFlag: 是否隐藏物品标志；custom-model-data: 资源包模型编号；commands: 点击动作。
# 按钮文本占位符：{player}、%player%、%player_name%、{mode}。
# commands 支持:
#   [command] spawn        玩家身份执行命令
#   [console] say {player} 控制台执行命令
#   [op] fly               临时 OP 执行命令
#   [message] &a文本       给玩家发送消息
#   [close]                关闭菜单
#   [sound] UI_BUTTON_CLICK 播放音效
menu:
  # Java 与基岩版都会使用对应模式标题；Java 标题支持 & 颜色代码，基岩版会自动移除颜色符号。
  title-daily: "&0每日收购 &8| &70点刷新"
  title-hourly: "&0限时收购 &8| &7整点刷新"
  size: 54
  sell-slots: [20, 21, 22, 23, 24]
  # 自动生成的收购商品按钮样式。图标本身来自商品，以下只配置 Lore。
  sell-item:
    # 支持 {item}、{price}、{sold}、{limit}、{remaining}、{player}、{mode}。
    lore:
      - "&7单价: &a${price}"
      - "&7本轮进度: &e{sold} &7/ &e{limit}"
      - "&7剩余额度: &f{remaining}"
      - ""
      - "&e点击出售背包内该物品"
    # true 时，额度用完会在 Lore 末尾追加 sold-out-line；false 时不追加。
    append-sold-out-line: true
    sold-out-line: "&c本轮额度已满"
  # buttons 中可以混合装饰物品、返回按钮、关闭按钮和命令按钮。
  # 基岩版表单只显示 commands 非空且玩家拥有 permission 的按钮。
  buttons:
    border-0:
      slot: 0
      material: BLACK_STAINED_GLASS_PANE
      name: "&8边框"
      hide-flags: true
    border-1:
      slot: 1
      material: BLACK_STAINED_GLASS_PANE
      name: "&8边框"
      hide-flags: true
    border-2:
      slot: 2
      material: BLACK_STAINED_GLASS_PANE
      name: "&8边框"
      hide-flags: true
    border-3:
      slot: 3
      material: BLACK_STAINED_GLASS_PANE
      name: "&8边框"
      hide-flags: true
    title:
      slot: 4
      material: EMERALD
      name: "&a&l每日收购商店"
      glow: true
      hide-flags: true
      lore:
        - "&7欢迎你，&f{player}"
        - "&7当前模式: &f{mode}"
        - "&7收购物品会按配置定时刷新。"
    border-5:
      slot: 5
      material: BLACK_STAINED_GLASS_PANE
      name: "&8边框"
      hide-flags: true
    border-6:
      slot: 6
      material: BLACK_STAINED_GLASS_PANE
      name: "&8边框"
      hide-flags: true
    border-7:
      slot: 7
      material: BLACK_STAINED_GLASS_PANE
      name: "&8边框"
      hide-flags: true
    border-8:
      slot: 8
      material: BLACK_STAINED_GLASS_PANE
      name: "&8边框"
      hide-flags: true
    help:
      slot: 31
      material: BOOK
      name: "&b收购说明"
      lore:
        - "&7每轮每种物品都有出售额度。"
        - "&7额度刷新后会重新随机收购物品。"
      commands:
        - "[message] &a把背包里的收购物品准备好后，点击对应物品即可出售。"
        - "[sound] UI_BUTTON_CLICK"
    back:
      slot: 48
      material: ARROW
      name: "&a返回主菜单"
      commands:
        - "[command] quickmenu open"
    close:
      slot: 50
      material: BARRIER
      name: "&c关闭菜单"
      commands:
        - "[close]"

# ==========================================
#             收购物品列表
# 格式:
# 材质名(全大写):
#   price: 每个物品的收购单价；/dss 普通购买价默认也从这里读取
#   daily-limit: DAILY 模式每人每轮上限；HOURLY 模式还会乘 hourly-settings.multiplier
#   name: 显示名称 (支持 & 颜色代码)
# 药水额外使用 material: POTION 与 potion-type；附魔书使用 material: ENCHANTED_BOOK 与 enchantment。
# 对这些特殊商品，插件只收购元数据完全相同的最高等级物品，不会把其他药水/附魔书误算为同一种。
# ==========================================

# ==========================================
# [模式 A] 固定商店配置
# 当 random-rotation.enabled: false 时使用此列表
# 可按同样格式增加或删除条目；固定模式不会读取下方 items。
# ==========================================
static-items:
  COBBLESTONE:
    price: 0.01
    daily-limit: 5000
    name: "&7圆石"
  DIRT:
    price: 0.01
    daily-limit: 5000
    name: "&6泥土"
  IRON_INGOT:
    price: 0.72
    daily-limit: 256
    name: "&f铁锭"
  # 在这里配置你希望永久显示的物品


# ==========================================
