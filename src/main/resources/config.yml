# 收购物品配置
# 物品ID必须是标准的 Bukkit Material 名称 (全大写)
# 参考: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Material.html
# ==========================================
#        DailySellShop 完整配置文件 (1.21)
# ==========================================

timezone: "Asia/Shanghai"

daily-rotation:
  enabled: true    # 是否开启随机 true = 从 'items' 里随机选 N 个; false = 显示 'static-items' 里的全部
  amount: 5       # 每天只从下面的列表中选出n个进行收购，仅在 enabled 为 true 时生效

messages:
  prefix: "&8[&a收购商&8] "
  sold: "&a成功出售 %amount% 个 %item%，获得 $%money%！(今日剩余: %limit%)"
  no-item: "&c你背包里没有足够的物品！"
  limit-reached: "&c该物品今日出售额度已用完！"
  config-reloaded: "&a配置已重载。"

# ==========================================
#             收购物品列表
# 格式:
# 材质名(全大写):
#   price: 单价
#   daily-limit: 每日每人最大出售数量
#   name: 显示名称 (支持 & 颜色代码)
# ==========================================

# ==========================================
# [模式 A] 固定商店配置
# 当 daily-rotation.enabled: false 时使用此列表
# ==========================================
static-items:
  COBBLESTONE:
    price: 0.01
    daily-limit: 5000
    name: "&7圆石"
  DIRT:
    price: 0.01
    daily-limit: 5000
    name: "&6泥土"
  IRON_INGOT:
